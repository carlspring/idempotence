name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write
  pull-requests: read
  security-events: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 22
        uses: actions/setup-java@v5
        with:
          cache: 'maven'
          distribution: 'temurin'
          java-version: '22'

      - name: Build with Maven
        run: ./mvnw -B clean verify

      - name: Convert JaCoCo XML to Cobertura XML
        run: |
          find . -name "jacoco.xml" -path "*/target/site/jacoco/jacoco.xml" | while read jacoco_file; do
            module_dir=$(echo "$jacoco_file" | sed 's|/target/site/jacoco/jacoco.xml||')
            src_dir="$module_dir/src/main/java"
            cobertura_file="$module_dir/target/site/jacoco/cobertura.xml"
            if [ -d "$src_dir" ]; then
              python3 .github/scripts/jacoco2cobertura.py "$jacoco_file" "$src_dir" > "$cobertura_file"
              echo "Converted $jacoco_file -> $cobertura_file"
            fi
          done

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/cobertura.xml'
          if-no-files-found: warn

      - name: Upload coverage to GitHub (idempotence-core)
        if: hashFiles('idempotence-core/target/site/jacoco/cobertura.xml') != ''
        uses: code-quality-org/upload-code-coverage-action@dd8808a1784733fd19ba6d53c01d780c5a9ff960 # main
        with:
          file: idempotence-core/target/site/jacoco/cobertura.xml
          language: Java
          label: code-coverage/jacoco-core

      - name: Upload coverage to GitHub (idempotence-maven)
        if: hashFiles('idempotence-maven/target/site/jacoco/cobertura.xml') != ''
        uses: code-quality-org/upload-code-coverage-action@dd8808a1784733fd19ba6d53c01d780c5a9ff960 # main
        with:
          file: idempotence-maven/target/site/jacoco/cobertura.xml
          language: Java
          label: code-coverage/jacoco-maven

      - name: Upload coverage to GitHub (idempotence-gradle)
        if: hashFiles('idempotence-gradle/target/site/jacoco/cobertura.xml') != ''
        uses: code-quality-org/upload-code-coverage-action@dd8808a1784733fd19ba6d53c01d780c5a9ff960 # main
        with:
          file: idempotence-gradle/target/site/jacoco/cobertura.xml
          language: Java
          label: code-coverage/jacoco-gradle

      - name: Check if version is a SNAPSHOT
        if: github.event_name == 'push'
        id: check_snapshot
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Snapshot to GitHub Packages
        if: github.event_name == 'push' && steps.check_snapshot.outputs.is_snapshot == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -s ./.github/settings.xml -B deploy -DskipTests=true

      - name: Set PR snapshot version
        if: github.event_name == 'pull_request'
        id: set_pr_version
        run: |
          BASE_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          PR_VERSION="${BASE_VERSION}-PR-${{ github.event.number }}-SNAPSHOT"
          echo "pr_version=${PR_VERSION}" >> $GITHUB_OUTPUT
          echo "Setting PR snapshot version to: ${PR_VERSION}"
          ./mvnw -B versions:set -DnewVersion="${PR_VERSION}" -DgenerateBackupPoms=false
          find idempotence-gradle-integration-tests -name "build.gradle.kts" -exec sed -i \
            -e "s|idempotence-core:[^\"]*\"|idempotence-core:${PR_VERSION}\"|g" \
            -e "s|idempotence-gradle:[^\"]*\"|idempotence-gradle:${PR_VERSION}\"|g" {} \;

      - name: Publish PR Snapshot to GitHub Packages
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -s ./.github/settings.xml -B deploy -DskipTests=true
